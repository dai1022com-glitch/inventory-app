<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>資機材 在庫管理アプリ</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; color: #333; }
        header { background-color: #2c3e50; color: white; padding: 15px; text-align: center; }
        .nav-buttons { display: flex; overflow-x: auto; background: #fff; border-bottom: 2px solid #ddd; white-space: nowrap; }
        .nav-buttons button { flex: 1; min-width: 80px; padding: 15px 10px; border: none; background: none; font-size: 14px; cursor: pointer; }
        .nav-buttons button.active { border-bottom: 3px solid #3498db; font-weight: bold; color: #3498db; }
        .page { display: none; padding: 20px; }
        .page.active { display: block; }
        .card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .form-group { margin-bottom: 15px; }
        .section-title { border-left: 5px solid #2ecc71; padding-left: 10px; margin-bottom: 15px; font-size: 16px; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .discard-title { border-left-color: #e74c3c; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; background: #fff; }
        
        .number-input-box { width: 100%; padding: 12px; border: 2px solid #3498db; border-radius: 5px; text-align: center; font-size: 20px; font-weight: bold; background: #ebf5fb; color: #2c3e50; cursor: pointer; }
        .staff-input { border: 2px solid #95a5a6; background-color: #f9f9f9; }

        .btn { display: block; width: 100%; padding: 12px; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; text-align: center; margin-top: 10px; }
        .btn-primary { background-color: #3498db; color: white; }
        .btn-success { background-color: #2ecc71; color: white; }
        .btn-danger { background-color: #e74c3c; color: white; margin-top: 5px; padding: 8px; font-size: 13px; }
        .btn-discard { background-color: #e67e22; color: white; }
        .radio-group { display: flex; gap: 10px; }
        .radio-group label { font-weight: normal; background: #eee; padding: 10px; border-radius: 5px; flex: 1; text-align: center; }
        
        .site-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .btn-site-select { background: #ecf0f1; border: 1px solid #bdc3c7; padding: 15px 10px; border-radius: 5px; font-size: 14px; cursor: pointer; text-align: center; font-weight: bold; overflow: hidden; text-overflow: ellipsis; }
        #site-status-detail { background: #fff; border: 2px solid #3498db; padding: 15px; border-radius: 8px; margin-top: 15px; display: none; }

        .history-item { border-left: 4px solid #3498db; padding: 10px; margin-bottom: 10px; font-size: 13px; position: relative; background: #fdfdfd; border-radius: 0 5px 5px 0; border: 1px solid #eee; border-left-width: 4px; }
        .history-date { color: #666; font-size: 11px; margin-bottom: 3px; display: flex; justify-content: space-between; }
        .staff-tag { background: #95a5a6; color: white; padding: 2px 6px; border-radius: 3px; font-size: 10px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .btn-delete { position: absolute; right: 5px; bottom: 5px; background: #ff4d4d; color: white; border: none; border-radius: 3px; padding: 3px 6px; font-size: 10px; cursor: pointer; }
        .master-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }

        .history-site-group { margin-bottom: 10px; }
        .history-site-header { background: #fff; padding: 12px; border-radius: 5px; border: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; font-weight: bold; cursor: pointer; }
        .history-site-content { display: none; padding: 10px 5px; }

        .history-controls { display: flex; gap: 10px; margin-bottom: 10px; }
        .btn-small { flex: 1; padding: 8px; font-size: 12px; background: #95a5a6; color: white; border: none; border-radius: 4px; cursor: pointer; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        .modal-container { background: white; padding: 20px; border-radius: 10px; width: 90%; max-width: 350px; text-align: center; max-height: 80vh; overflow-y: auto; }
        .num-display { font-size: 32px; font-weight: bold; margin-bottom: 15px; background: #f8f9fa; border: 1px solid #ddd; padding: 10px; border-radius: 5px; min-height: 40px; }
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .num-btn { background: #eee; border: none; padding: 18px; font-size: 22px; border-radius: 5px; cursor: pointer; color: #333; }
        .num-btn.done { background: #3498db; color: white; grid-column: span 2; }
        
        .confirm-list { text-align: left; background: #f9f9f9; padding: 10px; border-radius: 5px; margin: 15px 0; border: 1px solid #eee; }
        .confirm-item { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 5px 0; }
        .confirm-item:last-child { border: none; }

        .admin-content { display: none; margin-top: 15px; }
        .arrow { font-size: 12px; transition: transform 0.3s; }
    </style>
</head>
<body>

<div id="pw-modal" class="modal-overlay">
    <div class="modal-container">
        <h3>パスワード入力</h3>
        <div id="pw-dots" class="num-display" style="letter-spacing: 5px;"></div>
        <div class="numpad"><button class="num-btn" onclick="pressPwNum('1')">1</button><button class="num-btn" onclick="pressPwNum('2')">2</button><button class="num-btn" onclick="pressPwNum('3')">3</button><button class="num-btn" onclick="pressPwNum('4')">4</button><button class="num-btn" onclick="pressPwNum('5')">5</button><button class="num-btn" onclick="pressPwNum('6')">6</button><button class="num-btn" onclick="pressPwNum('7')">7</button><button class="num-btn" onclick="pressPwNum('8')">8</button><button class="num-btn" onclick="pressPwNum('9')">9</button><button class="num-btn" style="background:#fab1a0" onclick="pressPwNum('C')">C</button><button class="num-btn" onclick="pressPwNum('0')">0</button><button class="num-btn" onclick="closePwModal()">閉</button></div>
    </div>
</div>

<div id="num-modal" class="modal-overlay">
    <div class="modal-container">
        <h3 id="num-modal-title">数量を入力</h3>
        <div id="num-display-area" class="num-display">0</div>
        <div class="numpad"><button class="num-btn" onclick="pressKey('1')">1</button><button class="num-btn" onclick="pressKey('2')">2</button><button class="num-btn" onclick="pressKey('3')">3</button><button class="num-btn" onclick="pressKey('4')">4</button><button class="num-btn" onclick="pressKey('5')">5</button><button class="num-btn" onclick="pressKey('6')">6</button><button class="num-btn" onclick="pressKey('7')">7</button><button class="num-btn" onclick="pressKey('8')">8</button><button class="num-btn" onclick="pressKey('9')">9</button><button class="num-btn" style="background:#fab1a0;" onclick="pressKey('C')">C</button><button class="num-btn" onclick="pressKey('0')">0</button><button class="num-btn" onclick="closeNumModal()">閉</button><button class="num-btn done" onclick="confirmNum()">決定</button></div>
    </div>
</div>

<div id="confirm-modal" class="modal-overlay">
    <div class="modal-container">
        <h3>入力内容の確認</h3>
        <div id="confirm-content" class="confirm-list"></div>
        <button class="btn btn-success" onclick="executeSaveRecord()">OK（決定）</button>
        <button class="btn" style="background:#ccc;" onclick="closeConfirmModal()">修正する</button>
    </div>
</div>

<header><h2>資機材管理</h2></header>

<div class="nav-buttons">
    <button id="nav-site" class="active" onclick="handleNav('page-site', this)">現場入力</button>
    <button id="nav-discard" onclick="handleNav('page-discard', this)">廃棄入力</button>
    <button id="nav-history" onclick="handleNav('page-history', this)">履歴</button>
    <button id="nav-site-mgmt" onclick="handleNav('page-site-mgmt', this)">現場状況</button>
    <button id="nav-settings" onclick="handleNav('page-settings', this)">設定</button>
    <button id="nav-admin" onclick="handleNav('page-admin', this)">管理者専用</button>
</div>

<div id="page-site" class="page active">
    <div class="card">
        <h3>現場記録</h3>
        <div class="form-group">
            <label>現場名</label>
            <input type="text" id="site-name" placeholder="現場名を選択/入力" autocomplete="off" onclick="toggleSelectionGrid('site-selection-list')">
            <div id="site-selection-list" class="site-grid" style="display: none; margin-bottom: 15px;"></div>
        </div>
        <div class="form-group radio-group">
            <label><input type="radio" name="action-type" value="持ち出し" checked> 持ち出し</label>
            <label><input type="radio" name="action-type" value="持ち帰り"> 持ち帰り</label>
        </div>
        <button class="btn btn-primary" onclick="toggleEquipmentList()">資機材を選択する ▼</button>
        <div id="equipment-list" style="display: none; margin-top: 15px;"></div>
        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
        <div class="form-group"><label>担当者名</label><input type="text" id="site-staff" class="staff-input" placeholder="入力者の名前"></div>
        <button class="btn btn-success" onclick="confirmSiteRecord()">この内容で記録する</button>
    </div>
</div>

<div id="page-discard" class="page">
    <div class="card">
        <div class="section-title discard-title" style="cursor:default;">資機材/看板の廃棄</div>
        <div class="form-group">
            <label>現場名</label>
            <input type="text" id="discard-site-name" placeholder="現場名を選択/入力" autocomplete="off" onclick="toggleSelectionGrid('discard-site-selection-list')">
            <div id="discard-site-selection-list" class="site-grid" style="display: none; margin-bottom: 15px;"></div>
        </div>
        <div class="form-group">
            <label>種類</label>
            <input type="text" id="discard-item-name" placeholder="種類を選択" autocomplete="off" onclick="toggleSelectionGrid('discard-item-grid')">
            <div id="discard-item-grid" class="site-grid" style="display: none; margin-top: 10px; margin-bottom: 15px;"></div>
        </div>
        <div class="form-group">
            <label>数量</label>
            <div id="discard-val" class="number-input-box" onclick="openNumModal('discard-val', '廃棄数')">0</div>
        </div>
        <div class="form-group">
            <label>担当者名</label>
            <input type="text" id="discard-staff" class="staff-input" placeholder="入力者の名前">
        </div>
        <button class="btn btn-discard" onclick="confirmDiscardRecord()">廃棄を記録する</button>
    </div>
</div>

<div id="page-history" class="page"><div class="card"><h3>履歴検索 (現場ごと)</h3><input type="text" id="search-history" placeholder="検索..." onkeyup="renderHistory()"></div><div class="history-controls"><button class="btn-small" onclick="toggleAllHistory(true)">すべて展開</button><button class="btn-small" onclick="toggleAllHistory(false)">すべて閉じる</button></div><div id="history-display"></div></div>
<div id="page-site-mgmt" class="page"><div class="card"><h3>現場一覧 (現在の状況)</h3><div id="site-buttons-list" class="site-grid"></div><div id="site-status-detail"><h4 id="selected-site-name" style="margin-top:0; border-bottom:2px solid #3498db; padding-bottom:5px;"></h4><div id="selected-site-items"></div><button class="btn" style="background:#95a5a6; color:white; margin-top:15px; padding:8px;" onclick="closeSiteStatus()">閉じる</button></div></div></div>
<div id="page-settings" class="page"><div class="card"><h3>資機材マスター</h3><div class="form-group" style="display: flex; gap: 5px;"><input type="text" id="new-eq-name" placeholder="資機材名"><button class="btn btn-primary" style="margin-top:0; width: 80px;" onclick="addEqMaster()">追加</button></div><div id="eq-master-list"></div></div><div class="card"><h3>看板マスター</h3><div class="form-group" style="display: flex; gap: 5px;"><input type="text" id="new-sign-name" placeholder="看板名"><button class="btn btn-primary" style="margin-top:0; width: 80px;" onclick="addSignMaster()">追加</button></div><div id="sign-master-list-display"></div></div><div class="card"><h3>現場マスター登録</h3><div class="form-group" style="display: flex; gap: 5px;"><input type="text" id="new-site-master-name" placeholder="新しい現場名"><button class="btn btn-primary" style="margin-top:0; width: 80px;" onclick="addSiteMaster()">追加</button></div><div id="site-master-list-display"></div></div></div>
<div id="page-admin" class="page"><div class="card"><div class="section-title" onclick="toggleAdminContent('purchase-area', this)"><span>資機材/看板の購入</span><span class="arrow">▼ タップで開く</span></div><div id="purchase-area" class="admin-content"><div class="form-group"><label>種類</label><input type="text" id="purchase-item-name" placeholder="種類を入力" list="all-item-datalist" autocomplete="off"></div><div class="form-group"><label>数量</label><div id="purchase-val" class="number-input-box" onclick="openNumModal('purchase-val', '購入数')">0</div></div><div class="form-group"><label>担当者名</label><input type="text" id="purchase-staff" class="staff-input" placeholder="入力者の名前"></div><button class="btn btn-success" onclick="saveStockAction('購入')">購入を記録する</button></div></div><div class="card"><div class="section-title" onclick="toggleAdminContent('inventory-area', this)"><span>倉庫 在庫総数</span><span class="arrow">▼ タップで開く</span></div><div id="inventory-area" class="admin-content"><div id="inventory-display"></div></div></div></div>

<datalist id="all-item-datalist"></datalist>

<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = { databaseURL: "https://srpapd-2a50f-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const dbRef = database.ref('inventoryDB');
    const eqMasterRef = database.ref('equipmentMaster');
    const signMasterRef = database.ref('signMaster');
    const siteMasterRef = database.ref('siteMaster');

    const CORRECT_PW = "1122";
    let inputPw = "", pendingAction = null, db = [];
    let eqTypes = [], signTypes = [], siteTypes = [];
    let currentPendingRecord = null;

    // --- モーダル制御 ---
    let curTid = null, tmpNum = "";
    function openNumModal(tid, t) { curTid=tid; tmpNum=""; document.getElementById('num-modal-title').innerText=t; document.getElementById('num-display-area').innerText="0"; document.getElementById('num-modal').style.display='flex'; }
    function closeNumModal() { document.getElementById('num-modal').style.display='none'; }
    function pressKey(k) { if(k==='C') tmpNum=""; else if(tmpNum.length<4) tmpNum+=k; document.getElementById('num-display-area').innerText=tmpNum||"0"; }
    function confirmNum() { document.getElementById(curTid).innerText=parseInt(tmpNum,10)||0; closeNumModal(); }
    function openPwModal() { inputPw=""; updatePwDisp(); document.getElementById('pw-modal').style.display='flex'; }
    function closePwModal() { document.getElementById('pw-modal').style.display='none'; }
    function pressPwNum(n) {
        if(n==='C') inputPw=""; else inputPw+=n; updatePwDisp();
        if(inputPw===CORRECT_PW) { document.getElementById('pw-modal').style.display='none'; if(pendingAction){pendingAction(); pendingAction=null;} }
        else if(inputPw.length>=4) { inputPw=""; alert("パスワードが違います"); }
    }
    function updatePwDisp() { document.getElementById('pw-dots').innerText="●".repeat(inputPw.length); }
    function openConfirmModal(html) { document.getElementById('confirm-content').innerHTML = html; document.getElementById('confirm-modal').style.display = 'flex'; }
    function closeConfirmModal() { document.getElementById('confirm-modal').style.display = 'none'; }

    // --- ナビゲーション ---
    function handleNav(pid, btn) {
        if (pid === 'page-admin') { pendingAction = () => { showPage(pid, btn); }; openPwModal(); }
        else { showPage(pid, btn); if(pid==='page-history') renderHistory(); }
    }
    function showPage(pid, btn) { document.querySelectorAll('.page').forEach(e=>e.classList.remove('active')); document.querySelectorAll('.nav-buttons button').forEach(e=>e.classList.remove('active')); document.getElementById(pid).classList.add('active'); btn.classList.add('active'); closeSiteStatus(); }

    // --- Firebase同期 ---
    eqMasterRef.on('value', s => { eqTypes = s.val() ? Object.values(s.val()) : []; updateUI(); });
    signMasterRef.on('value', s => { signTypes = s.val() ? Object.values(s.val()) : []; updateUI(); });
    siteMasterRef.on('value', s => { siteTypes = s.val() ? Object.values(s.val()) : []; updateUI(); });
    dbRef.on('value', s => { db = s.val() ? Object.keys(s.val()).map(k=>({...s.val()[k], fKey:k})) : []; renderHistory(); renderInventory(); updateSiteStatusList(); });

    function updateUI() {
        renderSelectionGrids();
        renderSiteInputList();
        renderMasterList('eq-master-list', eqTypes, eqMasterRef);
        renderMasterList('sign-master-list-display', signTypes, signMasterRef);
        renderMasterList('site-master-list-display', siteTypes, siteMasterRef);
    }

    // --- グリッド選択制御 ---
    function renderSelectionGrids() {
        const siteHtml = siteTypes.map(s => `<button class="btn-site-select" onclick="selectFromGrid('${s}', 'site-name', 'site-selection-list')">${s}</button>`).join('');
        document.getElementById('site-selection-list').innerHTML = siteHtml;
        const discardSiteHtml = siteTypes.map(s => `<button class="btn-site-select" onclick="selectFromGrid('${s}', 'discard-site-name', 'discard-site-selection-list')">${s}</button>`).join('');
        document.getElementById('discard-site-selection-list').innerHTML = discardSiteHtml;
        const allItems = [...eqTypes.filter(t => t !== '看板'), ...signTypes.map(t => `看板（${t}）`)];
        const itemHtml = allItems.map(item => `<button class="btn-site-select" style="background:#f8f9fa;" onclick="selectFromGrid('${item}', 'discard-item-name', 'discard-item-grid')">${item}</button>`).join('');
        document.getElementById('discard-item-grid').innerHTML = itemHtml;
    }
    function toggleSelectionGrid(id) { const el = document.getElementById(id); el.style.display = (el.style.display === 'none') ? 'grid' : 'none'; }
    function selectFromGrid(value, inputId, gridId) { document.getElementById(inputId).value = value; document.getElementById(gridId).style.display = 'none'; }

    // --- 保存共通ロジック ---
    function executeSaveRecord() {
        if(!currentPendingRecord) return;
        const { name, staff, act, items } = currentPendingRecord;
        if(act !== '購入' && !siteTypes.includes(name)) siteMasterRef.push(name);
        dbRef.push({ id:Date.now(), dateStr:getNow(), type: (act==='購入'||act==='廃棄')?act:'現場', siteName:name, action:act, items:items, staff:staff });
        closeConfirmModal(); alert('保存しました'); resetForms();
    }

    // --- 現場入力 確認 ---
    function confirmSiteRecord() {
        const name=document.getElementById('site-name').value.trim(), staff=document.getElementById('site-staff').value;
        if(!name || !staff) return alert('現場名と担当者を入力してください');
        const act=document.querySelector('input[name="action-type"]:checked').value;
        let items=[];
        eqTypes.filter(t=>t!=='看板').forEach((t, i) => { const count=parseInt(document.getElementById(`site-eq-val-${i}`).innerText, 10); if(count>0) items.push({ name:t, count:count }); });
        signTypes.forEach((st, si) => { const count=parseInt(document.getElementById(`site-sign-val-${si}`).innerText, 10); if(count>0) items.push({ name:`看板（${st}）`, count:count }); });
        if(items.length===0) return alert('資機材が選択されていません');
        showConfirmModal(name, staff, act, items);
    }

    // --- 廃棄入力 確認 ---
    function confirmDiscardRecord() {
        const name=document.getElementById('discard-site-name').value.trim(), staff=document.getElementById('discard-staff').value;
        const itemName=document.getElementById('discard-item-name').value, count=parseInt(document.getElementById('discard-val').innerText, 10);
        if(!name || !staff || !itemName || count===0) return alert('現場名・種類・数量・担当者を全て入力してください');
        showConfirmModal(name, staff, '廃棄', [{name:itemName, count:count}]);
    }

    function showConfirmModal(name, staff, act, items) {
        let html = `<div><strong>現場:</strong> ${name}</div><div><strong>区分:</strong> ${act}</div><div><strong>担当:</strong> ${staff}</div><div style="margin-top:10px; border-top:1px solid #ccc; padding-top:5px;">【内訳】</div>`;
        items.forEach(it => { html += `<div class="confirm-item"><span>${it.name}</span><span>${it.count} 個</span></div>`; });
        currentPendingRecord = { name, staff, act, items };
        openConfirmModal(html);
    }

    // 管理者の購入は即時保存（既存仕様維持）
    function saveStockAction(actType) {
        if(actType==='廃棄') return confirmDiscardRecord();
        const pre = 'purchase';
        const name=document.getElementById(pre+'-item-name').value, staff=document.getElementById(pre+'-staff').value, count=parseInt(document.getElementById(pre+'-val').innerText, 10);
        if(!name || !staff || count===0) return alert('内容を確認してください');
        dbRef.push({ id:Date.now(), dateStr:getNow(), type:'購入', siteName:'会社', action:'購入', items:[{name:name, count:count}], staff:staff });
        alert('購入を記録しました'); document.getElementById(pre+'-val').innerText="0"; document.getElementById(pre+'-item-name').value="";
    }

    // --- 各種リセット・履歴・状況管理 ---
    function resetForms() {
        document.getElementById('site-name').value=''; document.getElementById('site-staff').value=''; 
        document.querySelectorAll('[id^="site-eq-val-"]').forEach(el=>el.innerText="0");
        document.getElementById('discard-site-name').value=''; document.getElementById('discard-item-name').value=''; 
        document.getElementById('discard-val').innerText="0"; document.getElementById('discard-staff').value='';
        document.getElementById('equipment-list').style.display='none';
        document.querySelectorAll('.site-grid').forEach(g => g.style.display='none');
    }

    function renderSiteInputList() {
        let h=''; eqTypes.filter(t=>t!=='看板').forEach((t, i) => { h+=`<div class="form-group"><label>${t}</label><div id="site-eq-val-${i}" class="number-input-box" onclick="openNumModal('site-eq-val-${i}', '${t}')">0</div></div>`; });
        h+=`<hr style="margin: 20px 0; border: 0; border-top: 1px solid #ddd;"><div class="form-group"><label>看板</label><button class="btn btn-primary" style="background-color:#95a5a6; margin-top:5px;" onclick="toggleSignList()">看板を選択する ▼</button><div id="sign-list" style="display: none; margin-top: 10px; padding:10px; background:#f9f9f9; border-radius:5px;"></div></div>`;
        document.getElementById('equipment-list').innerHTML=h;
        const area = document.getElementById('sign-list'); let sh = ''; signTypes.forEach((st, si) => { sh += `<div class="form-group"><label style="font-size:14px; font-weight:normal;">${st}</label><div id="site-sign-val-${si}" class="number-input-box" style="padding:8px; font-size:16px;" onclick="openNumModal('site-sign-val-${si}', '看板（${st}）')">0</div></div>`; });
        area.innerHTML = sh || '<p style="font-size:12px;">未登録</p>';
    }
    function toggleSignList() { const e = document.getElementById('sign-list'); e.style.display = e.style.display === 'none' ? 'block' : 'none'; }
    function toggleEquipmentList() { const e=document.getElementById('equipment-list'); e.style.display=e.style.display==='none'?'block':'none'; }

    function renderHistory() {
        const sw = document.getElementById('search-history').value.toLowerCase(); const grouped = {};
        db.forEach(r => { const site = r.siteName || 'その他'; if(!grouped[site]) grouped[site] = []; grouped[site].push(r); });
        let h = ''; const sortedSites = Object.keys(grouped).sort((a,b) => Math.max(...grouped[b].map(x=>x.id)) - Math.max(...grouped[a].map(x=>x.id)));
        sortedSites.forEach(siteName => {
            const filtered = grouped[siteName].filter(r => (siteName + r.items.map(i=>i.name).join('') + r.staff).toLowerCase().includes(sw));
            if(sw && filtered.length === 0) return;
            h += `<div class="history-site-group"><div class="history-site-header" onclick="toggleHistoryGroup(this)"><span>${siteName}</span><span class="history-toggle-label">${filtered.length}件 ▼</span></div><div class="history-site-content">`;
            filtered.sort((a,b)=>b.id-a.id).forEach(r => {
                let c = '#3498db'; if(r.action==='持ち出し') c='#e74c3c'; if(r.action==='購入') c='#2ecc71'; if(r.action==='廃棄') c='#e67e22';
                h += `<div class="history-item" style="border-left-color:${c}"><div class="history-date"><span>${r.dateStr}</span><span class="staff-tag">${r.staff}</span></div><strong>${r.action}</strong>: <small>${r.items.map(i=>i.name+':'+i.count).join(', ')}</small><button class="btn-delete" onclick="deleteRecord('${r.fKey}')">削除</button></div>`;
            });
            h += `</div></div>`;
        });
        document.getElementById('history-display').innerHTML = h || '<p style="text-align:center; color:#999;">履歴がありません</p>';
    }
    function toggleHistoryGroup(el) { const content = el.nextElementSibling; const isVisible = content.style.display === 'block'; content.style.display = isVisible ? 'none' : 'block'; el.querySelector('.history-toggle-label').innerText = isVisible ? content.children.length + '件 ▼' : '▲ 閉じる'; }
    function toggleAllHistory(isOpen) { document.querySelectorAll('.history-site-content').forEach((c, i) => { c.style.display = isOpen ? 'block' : 'none'; document.querySelectorAll('.history-toggle-label')[i].innerText = isOpen ? '▲ 閉じる' : c.children.length + '件 ▼'; }); }
    function renderMasterList(id, list, ref) { document.getElementById(id).innerHTML = list.map(t => `<div class="master-item"><span>${t}</span><button class="btn-danger" style="width:60px;" onclick="deleteMaster('${t}', '${ref.key}')">削除</button></div>`).join(''); }
    function addSiteMaster() { const n=document.getElementById('new-site-master-name').value.trim(); if(n&&!siteTypes.includes(n)){siteMasterRef.push(n); document.getElementById('new-site-master-name').value='';} }
    function addEqMaster() { const n=document.getElementById('new-eq-name').value.trim(); if(n&&!eqTypes.includes(n)){eqMasterRef.push(n); document.getElementById('new-eq-name').value='';} }
    function addSignMaster() { const n=document.getElementById('new-sign-name').value.trim(); if(n&&!signTypes.includes(n)){signMasterRef.push(n); document.getElementById('new-sign-name').value='';} }
    function deleteMaster(n, rKey) { if(n==='看板') return; if(confirm(n+' を削除しますか？')) database.ref(rKey).once('value', s=>s.forEach(c=>{if(c.val()===n)c.ref.remove();})); }
    function getNow() { const n=new Date(); return `${n.getFullYear()}/${n.getMonth()+1}/${n.getDate()} ${n.getHours()}:${String(n.getMinutes()).padStart(2,'0')}`; }
    function updateSiteStatusList() { document.getElementById('site-buttons-list').innerHTML = siteTypes.map(s => `<button class="btn-site-select" onclick="showSiteStatus('${s}')">${s}</button>`).join(''); }
    function showSiteStatus(siteName) {
        const display = document.getElementById('site-status-detail'); let status = {};
        db.filter(r => r.siteName === siteName).forEach(r => { r.items.forEach(it => { if(!status[it.name]) status[it.name] = 0; if(r.action === '持ち出し') status[it.name] += it.count; if(r.action === '持ち帰り' || r.action === '廃棄') status[it.name] -= it.count; }); });
        document.getElementById('selected-site-name').innerText = siteName + " の状況";
        let h = '<ul>', has = false; for(let key in status) { if(status[key] > 0) { h += `<li><strong>${key}</strong>: ${status[key]} 個</li>`; has = true; } }
        document.getElementById('selected-site-items').innerHTML = has ? h + '</ul>' : '<p>持ち出し中の資機材はありません。</p>'; display.style.display = 'block'; window.scrollTo(0, document.body.scrollHeight);
    }
    function closeSiteStatus() { document.getElementById('site-status-detail').style.display='none'; }
    function deleteRecord(key) { pendingAction=()=>{if(confirm('削除しますか？'))database.ref('inventoryDB/'+key).remove();}; openPwModal(); }
    function renderInventory() {
        let total = {}; db.forEach(r => { r.items.forEach(it => { if(!total[it.name]) total[it.name] = 0; if(r.action==='購入' || r.action==='持ち帰り') total[it.name] += it.count; else total[it.name] -= it.count; }); });
        let th = '<table><tr><th>資機材</th><th>倉庫在庫</th></tr>'; for(let k in total) th += `<tr><td>${k}</td><td>${total[k]} 個</td></tr>`;
        document.getElementById('inventory-display').innerHTML = th + '</table>';
    }
    function toggleAdminContent(id, titleEl) { const content = document.getElementById(id); const arrow = titleEl.querySelector('.arrow'); if (content.style.display === 'block') { content.style.display = 'none'; arrow.innerText = '▼ タップで開く'; } else { content.style.display = 'block'; arrow.innerText = '▲ 閉じる'; } }
</script>
</body>
</html>
